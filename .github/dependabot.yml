# Dependabot opens PRs for dependency updates. CI then tests them, which is the
# point: an unreviewed, untested dependency bump in an alerting system is not an
# improvement.
version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine updates, separate PRs for majors — which need reading.
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /apps/pwa
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
