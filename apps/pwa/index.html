<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!--
      iOS takes the Home Screen icon from apple-touch-icon, not from the web
      manifest, and expects 180x180. The manifest icons below are what Android
      uses.
    -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- The label shown under the icon on the Home Screen. -->
    <meta name="apple-mobile-web-app-title" content="Home" />
    <title>Home Notifications</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
